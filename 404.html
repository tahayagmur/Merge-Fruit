<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/jpeg" href="tamga-logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – Sinyal Kaybı | Tamga Studio</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg2:#050607;--acc:#00ff9c;--acc2:#00e5ff;
  --txt:#e6edf3;--mut:#8b98a5;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Syncopate',sans-serif;
}
body{
  background:var(--bg2);color:var(--txt);
  min-height:100vh;min-height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;overflow:hidden;font-family:var(--mono);
}
#bgMatrix{position:fixed;inset:0;width:100%;height:100%;z-index:0;opacity:.1;pointer-events:none}
.crt{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px),
    radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.8) 100%);
}
.box{position:relative;z-index:2}
.code{
  font-family:var(--disp);font-size:clamp(4rem,18vw,9rem);font-weight:700;
  letter-spacing:.06em;line-height:1;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(0,255,156,.35));
  position:relative;animation:glitch 3.2s infinite;
}
@keyframes glitch{
  0%,93%,100%{transform:translate(0)}
  94%{transform:translate(-3px,1px) skewX(-2deg)}
  95%{transform:translate(3px,-1px)}
  96%{transform:translate(-2px,2px) skewX(2deg)}
  97%{transform:translate(0)}
}
.label{
  font-size:clamp(.7rem,2.4vw,.95rem);letter-spacing:.5em;text-transform:uppercase;
  color:var(--acc);margin:22px 0 14px;
}
.desc{color:var(--mut);font-size:.86rem;line-height:1.8;max-width:440px;margin:0 auto 36px}
.desc b{color:var(--acc2);font-weight:400}
.btn{
  display:inline-block;font-size:.78rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  text-decoration:none;background:var(--acc);color:#02130b;padding:16px 32px;transition:.25s;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
}
.btn:hover{background:var(--acc2);box-shadow:0 0 34px rgba(0,229,255,.45);transform:translateY(-2px)}
.corner{position:fixed;width:26px;height:26px;border:1px solid rgba(0,255,156,.45);z-index:2}
.tl{top:18px;left:18px;border-right:0;border-bottom:0}
.tr{top:18px;right:18px;border-left:0;border-bottom:0}
.bl{bottom:18px;left:18px;border-right:0;border-top:0}
.br{bottom:18px;right:18px;border-left:0;border-top:0}
</style>
</head>
<body>

<canvas id="bgMatrix" aria-hidden="true"></canvas>
<div class="crt" aria-hidden="true"></div>
<i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>

<div class="box">
  <div class="code">404</div>
  <p class="label">// Sinyal Kaybı</p>
  <p class="desc">Aradığın sayfa bu koordinatlarda bulunamadı.<br>Bağlantı koptu ya da sayfa başka bir boyuta taşındı.<br><b>&gt; rota yeniden hesaplanıyor...</b></p>
  <a class="btn" href="/">◂ Üsse Geri Dön</a>
</div>

<script>
(function(){
  'use strict';
  var bg=document.getElementById('bgMatrix'),ctx=bg.getContext('2d');
  var cols=[],FS=14,W=0,H=0,timer=0;
  var GLYPHS='01アイウエオカキクケコ<>/{}[]=+*#$&%!?;:404'.split('');
  function resize(){
    W=window.innerWidth;H=window.innerHeight;bg.width=W;bg.height=H;
    var n=Math.ceil(W/FS);cols.length=0;
    for(var i=0;i<n;i++)cols.push(Math.random()*-100);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  }
  function step(now){
    requestAnimationFrame(step);
    if(now-timer<60)return;timer=now;
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(0,0,W,H);
    ctx.font=FS+'px "JetBrains Mono",monospace';
    for(var i=0;i<cols.length;i++){
      var ch=GLYPHS[(Math.random()*GLYPHS.length)|0];
      ctx.fillStyle=Math.random()<0.08?'#aaffdd':'#00ff9c';
      ctx.fillText(ch,i*FS,cols[i]*FS);
      if(cols[i]*FS>H&&Math.random()>0.975)cols[i]=0;
      cols[i]++;
    }
  }
  resize();window.addEventListener('resize',resize);
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches)requestAnimationFrame(step);
})();
</script>

</body>
</html>
